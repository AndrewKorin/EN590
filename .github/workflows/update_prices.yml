name: Update Commodity Prices

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run price updater
        run: |
          python update_prices.py

      - name: Commit and push updated index.html
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "EN590 Price Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 Auto-update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
